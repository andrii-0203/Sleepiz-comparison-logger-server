# Render Blueprint: use this when creating a new Web Service from repo.
# If your service already exists, set in Dashboard:
#   Build Command: yarn install && yarn build
#   Start Command: yarn start   (or: node dist/index.js)

services:
  - type: web
    name: comparison-logger
    runtime: node
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
